<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Wellness Check | MindCheck</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); padding: 20px; text-align: center; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: var(--white); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); margin-bottom: 10px; }
        .question { margin-top: 25px; text-align: left; font-weight: bold; color: var(--primary); }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .btn-check { display: none; }
        .btn-label { background: #f0f2f5; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; text-align: left; border: 1px solid #ddd; }
        .btn-check:checked + .btn-label { background: var(--accent); color: white; border-color: var(--accent); }
        #result-section { display: none; margin-top: 30px; padding: 25px; border-radius: 12px; animation: fadeIn 0.6s; }
        .advice-card { background: rgba(255,255,255,0.9); border-left: 5px solid; padding: 15px; margin-top: 15px; text-align: left; line-height: 1.6; }
        button#submit-btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 18px; margin-top: 30px; transition: 0.3s; }
        button#submit-btn:hover { background: #1a252f; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>🌱 Student MindCheck</h1>
    <p>A safe space to assess your academic burnout and get professional guidance.</p>

    <div id="quiz">
        <div class="question">1. How would you describe your sleep quality recently?</div>
        <div class="options">
            <input type="radio" name="q1" value="0" id="q1a" class="btn-check"><label for="q1a" class="btn-label">I sleep well and feel refreshed.</label>
            <input type="radio" name="q1" value="1" id="q1b" class="btn-check"><label for="q1b" class="btn-label">Interrupted sleep; I keep thinking about studies.</label>
            <input type="radio" name="q1" value="2" id="q1c" class="btn-check"><label for="q1c" class="btn-label">Severe insomnia and constant exhaustion.</label>
        </div>

        <div class="question">2. Do you still feel motivated to complete your academic tasks?</div>
        <div class="options">
            <input type="radio" name="q2" value="0" id="q2a" class="btn-check"><label for="q2a" class="btn-label">Yes, I still have my passion.</label>
            <input type="radio" name="q2" value="1" id="q2b" class="btn-check"><label for="q2b" class="btn-label">Sometimes I feel heavy and bored.</label>
            <input type="radio" name="q2" value="2" id="q2c" class="btn-check"><label for="q2c" class="btn-label">I feel completely drained and helpless.</label>
        </div>

        <button id="submit-btn" onclick="calculateResult()">Get My Results & Advice</button>
    </div>

    <div id="result-section">
        <h2 id="status-title"></h2>
        <div id="advice-content" class="advice-card"></div>
        <button onclick="location.reload()" style="background:none; color:gray; border:none; cursor:pointer; margin-top:20px; text-decoration:underline;">Retake Test ↻</button>
    </div>
</div>

<script>
    function calculateResult() {
        let score = 0;
        const q1 = document.querySelector('input[name="q1"]:checked');
        const q2 = document.querySelector('input[name="q2"]:checked');

        if(!q1 || !q2) { alert("Please answer all questions first!"); return; }

        score = parseInt(q1.value) + parseInt(q2.value);
        
        document.getElementById('quiz').style.display = 'none';
        const resSection = document.getElementById('result-section');
        const title = document.getElementById('status-title');
        const advice = document.getElementById('advice-content');
        resSection.style.display = 'block';

        if(score <= 1) {
            resSection.style.backgroundColor = "#d4edda";
            title.innerText = "😊 Stable Status";
            title.style.color = "#155724";
            advice.innerHTML = "<b>Guidance:</b> You are doing great! Keep maintaining your work-life balance. Remember, prevention is better than cure—keep up with your hobbies.";
            advice.style.borderColor = "#28a745";
        } else if(score <= 3) {
            resSection.style.backgroundColor = "#fff3cd";
            title.innerText = "😐 Moderate Fatigue";
            title.style.color = "#856404";
            advice.innerHTML = "<b>Guidance:</b> Your mind is sending warning signals. You are experiencing accumulated stress. Try 'Digital Detox' for 2 hours daily and prioritize your tasks to reduce mental clutter.";
            advice.style.borderColor = "#ffc107";
        } else {
            resSection.style.backgroundColor = "#f8d7da";
            title.innerText = "😫 High Burnout Risk";
            title.style.color = "#721c24";
            advice.innerHTML = "<b>Deep Advice:</b> Stop and breathe. This level requires a serious restructure of your routine. It's okay to seek support from a counselor or a trusted friend. Your mental health is the engine of your academic success—without it, the car won't move.";
            advice.style.borderColor = "#dc3545";
        }
    }
</script>

</body>
</html>
